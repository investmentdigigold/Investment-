<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DigiGold Investment Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: #22c55e;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .note {
      font-size: 12px;
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="title">💰 DigiGold Investment</div>

  <input type="number" id="amount" placeholder="Enter Amount (₹)" />

  <button onclick="payNow()">Pay Now</button>

  <div class="note">
    UPI ID: 8864906428@fam
  </div>
</div>

<script>
function payNow() {
    let amount = document.getElementById("amount").value;

    if (!amount || amount <= 0) {
        alert("Please enter a valid amount");
        return;
    }

    let upiID = "8864906428@fam";
    let name = "DigiGold Investment";

    let upiURL =
      "upi://pay?pa=" + upiID +
      "&pn=" + encodeURIComponent(name) +
      "&am=" + amount +
      "&cu=INR";

    window.location.href = upiURL;
}
</script>

</body>
</html>
